#use below for railway deployment
spring.application.name=AUTH-SERVICE
server.port=${PORT:8086}

#eureka.client.service-url.defaultZone=${EUREKA_URL:http://localhost:8761/eureka}

spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/smart_gym_platform}
spring.datasource.username=${DB_USER:root}
spring.datasource.password=${DB_PASS:root}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
eureka.instance.hostname=${EUREKA_INSTANCE_HOSTNAME}

eureka.instance.non-secure-port-enabled=false
eureka.instance.secure-port-enabled=true
eureka.instance.secure-port=443

eureka.instance.status-page-url=https://${EUREKA_INSTANCE_HOSTNAME}/actuator/info
eureka.instance.health-check-url=https://${EUREKA_INSTANCE_HOSTNAME}/actuator/health
eureka.instance.home-page-url=https://${EUREKA_INSTANCE_HOSTNAME}
eureka.client.service-url.defaultZone=${EUREKA_URL}
